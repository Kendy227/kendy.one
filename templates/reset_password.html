<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no">
  <link rel="icon" href="https://kendyenterprises.in/image/logo-knd.png">
  <title>Kendy Enterprises | Reset Password</title>
  <style>
    :root {
      --primary: #00FFAA;
      --secondary: #FF00FF;
      --bg: #000000;
      --card-bg: rgba(15, 15, 15, 0.8);
      --text: #FFFFFF;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Animated Background VFX */
    .vfx-bg {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #0F0F0F 0%, #000000 100%);
      z-index: -1;
    }

    .vfx-bg::after {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse at center, black, transparent 80%);
    }

    /* Card Styling */
    .card {
      position: relative;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 242, 255, 0.2);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.05);
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h3 {
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--primary);
      text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
    }

    .note {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 25px;
    }

    /* VFX Inputs */
    .input-group {
      position: relative;
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: var(--primary);
      opacity: 0.8;
    }

    input[type=password] {
      width: 100%;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.3s;
      outline: none;
    }

    input[type=password]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
      background: rgba(0, 0, 0, 0.5);
    }

    /* VFX Button */
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(45deg, var(--secondary), var(--primary));
      border: none;
      border-radius: 4px;
      color: white;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
    }

    button:active { transform: scale(0.98); }

    /* Success/Error Message */
    #message {
      margin-top: 20px;
      min-height: 20px;
      font-weight: bold;
      transition: color 0.3s;
    }

    .success { color: #00ff88 !important; text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }
    .error { color: #ff4444 !important; text-shadow: 0 0 10px rgba(255, 68, 68, 0.4); }

  </style>
</head>
<body>

  <div class="vfx-bg"></div>

  <div class="card">
    <h3>Reset Identity</h3>
    <p class="note">Security token active. Valid for 10 minutes.</p>
    
    <form id="resetForm">
      <input type="hidden" name="token" id="tokenInput" value="{{ token or '' }}">
      
      <div class="input-group">
        <label>New Access Key</label>
        <input type="password" name="password" id="password" required minlength="6" placeholder="••••••••">
      </div>

      <button type="submit" id="submitBtn">Authorize Reset</button>
    </form>
    
    <p id="message"></p>
  </div>

  <script>
    (function(){
      function qs(name){
        name = name.replace(/[\[\]]/g, '\\$&');
        var re = new RegExp('[?&]'+name+'(=([^&#]*)|&|#|$)'),
            results = re.exec(window.location.href);
        if(!results) return null;
        if(!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
      }

      var tokenEl = document.getElementById('tokenInput');
      if(!tokenEl.value){
        var t = qs('token'); if(t) tokenEl.value = t;
      }

      var form = document.getElementById('resetForm');
      var msg = document.getElementById('message');
      var btn = document.getElementById('submitBtn');

      form.addEventListener('submit', function(e){
        e.preventDefault();
        var token = tokenEl.value;
        var password = document.getElementById('password').value;

        if(!token){ 
            msg.textContent = 'CRITICAL ERROR: MISSING TOKEN'; 
            msg.className = 'error';
            return; 
        }

        // Button Loading State
        btn.textContent = 'PROCESSING...';
        btn.style.opacity = '0.7';

        fetch(window.location.pathname + (window.location.search || ''), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: password })
        }).then(function(r){ return r.json(); }).then(function(j){
          btn.textContent = 'AUTHORIZE RESET';
          btn.style.opacity = '1';

          if(j.success){ 
            msg.textContent = 'ACCESS GRANTED. PASSWORD UPDATED.'; 
            msg.className = 'success';
            form.reset(); 
          }
          else { 
            msg.textContent = 'ACCESS DENIED: ' + (j.error || 'INVALID TOKEN'); 
            msg.className = 'error';
          }
        }).catch(function(err){ 
          btn.textContent = 'AUTHORIZE RESET';
          msg.textContent = 'CONNECTION INTERRUPTED'; 
          msg.className = 'error';
        });
      });
    })();
  </script>
</body>
</html>
