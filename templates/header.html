<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://kendyenterprises.in/image/logo-knd.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00FFAA;
            --primary-glow: rgba(0, 255, 170, 0.4);
            --bg-dark: #000000;
            --surface-dark: #0F0F0F;
            --text-main: #FFFFFF;
            --text-dim: #B0B0B0;
        }

        /* Prevent all zoom and scaling */
        html, body {
            touch-action: manipulation;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
        }

        /* --- Glassmorphism & VFX --- */
        .glass-header {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cyber-logo {
            text-shadow: 0 0 15px var(--primary-glow);
            letter-spacing: -0.02em;
        }

        /* --- Custom Navigation Hover Effects --- */
        .nav-item {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            box-shadow: 0 0 8px var(--primary);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .nav-item:hover {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary-glow);
        }

        /* --- Balance Badge --- */
        .balance-card {
            background: linear-gradient(135deg, rgba(0, 255, 170, 0.1) 0%, rgba(15, 15, 15, 0.5) 100%);
            border: 1px solid rgba(0, 255, 170, 0.3);
            box-shadow: inset 0 0 12px rgba(0, 255, 170, 0.05);
            transition: transform 0.2s ease;
        }
        
        .balance-card:hover {
            transform: translateY(-1px);
            border-color: var(--primary);
        }

        /* --- Sidebar Drawer --- */
        .sidebar-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 300px;
            height: 100vh;
            background: #0F0F0F;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Slide in by resetting transform to 0 */
        .sidebar-drawer.active {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- Mobile Bottom Nav --- */
        .mobile-nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 -10px 25px rgba(0,0,0,0.3);
            height: calc(65px + env(safe-area-inset-bottom));
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.3s ease;
            border-radius: 12px;
            min-width: 60px;
            position: relative;
        }

        .mobile-nav-item:hover {
            color: var(--primary);
            background: rgba(6, 182, 212, 0.1);
            transform: translateY(-2px);
        }

        .mobile-nav-item i {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .mobile-nav-item span {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .center-action {
            position: relative;
            margin: 0 20px;
        }

        .center-circle {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(6, 182, 212, 0.5);
            border: 4px solid #020617;
            transform: translateY(-25px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .center-circle::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            opacity: 0.3;
            z-index: -1;
            animation: pulse 2s infinite;
        }

        .center-circle:hover {
            transform: translateY(-28px) scale(1.08);
            box-shadow: 0 8px 30px rgba(6, 182, 212, 0.6);
        }

        .center-circle i {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.5; }
            100% { transform: scale(1); opacity: 0.3; }
        }

        /* --- Pulse Animation --- */
        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #10b981;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @media (max-width: 1024px) {
            .desktop-only { display: none !important; }
        }

        /* --- Mobile adjustments (fit for small devices) --- */
        @media (max-width: 640px) {
            body { padding-bottom: 65px; }
            header.glass-header { height: 64px; }
            .cyber-logo { font-size: 1rem; line-height:1; }
            .container { padding-left: 12px; padding-right: 12px; }
            .balance-card { padding: 0.35rem 0.6rem; min-width: 88px; }
            #balanceText { font-size: 11px; }
            .sidebar-drawer { width: min(300px, 80vw); }
            .mobile-nav { 
                height: calc(60px + env(safe-area-inset-bottom)); 
                padding: 0 12px;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .mobile-nav-item {
                min-width: 55px;
                padding: 8px;
            }
            .mobile-nav-item i { font-size: 20px; }
            .mobile-nav-item span { font-size: 10px; }
            .center-circle { 
                width: 50px; 
                height: 50px; 
                transform: translateY(-22px);
            }
            .center-circle i { font-size: 22px; }
            .center-action { margin: 0 15px; }
            .nav-item { font-size: 13px; }
            /* prevent long header content from overflowing */
            .container > .flex { flex-wrap: wrap; gap:8px; }
        }

        /* --- Medium devices (tablets) --- */
        @media (min-width: 641px) and (max-width: 1023px) {
            body { padding-bottom: 70px; }
            .mobile-nav { 
                height: calc(65px + env(safe-area-inset-bottom)); 
                padding: 0 18px;
                padding-bottom: env(safe-area-inset-bottom);
            }
            .mobile-nav-item {
                min-width: 65px;
                padding: 12px;
            }
            .mobile-nav-item i { font-size: 24px; }
            .mobile-nav-item span { font-size: 12px; }
            .center-circle { 
                width: 56px; 
                height: 56px; 
                transform: translateY(-28px);
            }
            .center-circle i { font-size: 26px; }
            .center-action { margin: 0 25px; }
        }

        /* --- Large devices (small desktops) --- */
        @media (min-width: 1024px) {
            .mobile-nav { display: none; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header Wrapper -->
    <header class="glass-header sticky top-0 z-50 w-full h-[72px] flex items-center">
        <div class="container mx-auto px-4 md:px-6 flex items-center justify-between">
            
            <!-- Logo Section -->
            <div class="flex items-center gap-3">
                <button id="menuTrigger" class="lg:hidden p-2 text-text-dim hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
                <a href="/" class="flex items-center cursor-pointer group">
                    <h1 class="text-xl font-bold cyber-logo">
                        <span class="text-cyan-400">KENDY</span><span class="text-slate-400 font-medium">ENTERPRISES</span>
                    </h1>
                </a>
            </div>

            <!-- Desktop Navigation -->
            <nav class="hidden lg:flex items-center gap-8">
                <a href="/" class="nav-item text-sm font-semibold text-text-main">Home</a>
                <a href="/region_checker" class="nav-item text-sm font-semibold text-text-dim hover:text-white">Checker</a>
                <a href="/orders" class="nav-item text-sm font-semibold text-text-dim hover:text-white">History</a>
                <a href="/transactions" class="nav-item text-sm font-semibold text-text-dim hover:text-white">Transection</a>
                <a href="/dashboard" class="nav-item text-sm font-semibold text-text-dim hover:text-white">Dashboard</a>
            </nav>

            <!-- User Actions -->
            <div class="flex items-center gap-3">
                {% if session.get('user_id') %}
                    <!-- Logged In: Show Balance -->
                    <div id="balanceContainer" class="balance-card px-4 py-1.5 rounded-full flex items-center gap-2 cursor-pointer" onclick="window.location.href='/add_fund'">
                        <span id="balanceText" class="text-sm font-bold text-cyan-50 text-[11px] md:text-sm">
                            <i class="fas fa-wallet text-cyan-400 mr-1"></i><span id="currencySymbol">₹</span>0.00
                        </span>
                    </div>
                    
                    <a href="/account" class="desktop-only w-10 h-10 rounded-full border border-white/10 flex items-center justify-center hover:bg-white/5 transition-colors">
                        <svg class="w-5 h-5 text-text-dim" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </a>
                {% else %}
                    <!-- Not Logged In: Show Login Button -->
                    <a href="/auth" class="balance-card px-4 py-1.5 rounded-full flex items-center gap-2 cursor-pointer hover:border-cyan-400 transition-colors">
                        <i class="fas fa-sign-in-alt text-cyan-400 mr-1"></i>
                        <span class="text-sm font-bold text-cyan-50 text-[11px] md:text-sm">Login</span>
                    </a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- Sidebar Overlay & Drawer -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <aside id="sidebar" class="sidebar-drawer flex flex-col">
        <div class="p-6 border-bottom border-white/5 flex items-center justify-between">
            <span class="text-xl font-bold">MENU</span>
            <button id="closeSidebar" class="p-2 text-text-dim"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg></button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-2">
            <a href="/" class="flex items-center gap-4 p-4 rounded-xl bg-cyan-500/10 text-cyan-400 font-bold">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Home
            </a>
            <a href="/region_checker" class="flex items-center gap-4 p-4 rounded-xl text-text-dim hover:bg-white/5 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                Region Checker
            </a>
            <a href="/orders" class="flex items-center gap-4 p-4 rounded-xl text-text-dim hover:bg-white/5 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                Order History
            </a>
            <a href="/dashboard" class="flex items-center gap-4 p-4 rounded-xl text-text-dim hover:bg-white/5 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Dashboard
            </a>
        </div>

        <div class="p-4 border-t border-white/5">
            <a href="/logout" class="flex items-center gap-4 p-4 rounded-xl text-rose-500 hover:bg-rose-500/10 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Sign Out
            </a>
        </div>
    </aside>

    <!-- Mobile Bottom Navigation (Floating) -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 mobile-nav flex justify-around items-center px-4 z-[998]">
        <a href="/" class="mobile-nav-item">
            <i class="fas fa-house"></i>
            <span>Home</span>
        </a>
        <a href="/orders" class="mobile-nav-item">
            <i class="fas fa-boxes-stacked"></i>
            <span>Orders</span>
        </a>
        <a href="/add_fund" class="mobile-nav-item center-action">
            <div class="center-circle">
                <i class="fas fa-plus"></i>
            </div>
        </a>
        <a href="https://wa.me/917641925736?text=Would%20you%20be%20available%20for%20a%20brief%20consultation%3F" target="_blank" rel="noopener noreferrer" class="mobile-nav-item">
            <img src="https://kendyenterprises.in/image/whatsapp-image.png" alt="WhatsApp" class="w-6 h-6">
            <span class="text-[10px] font-bold">WHATSAPP</span>
        </a>
        <a href="/account" class="mobile-nav-item">
            <i class="fas fa-circle-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Floating WhatsApp for Desktop -->
    <div class="hidden lg:block fixed right-4 bottom-4 z-50">
        <a href="https://wa.me/7641925736?text=Would%20you%20be%20available%20for%20a%20brief%20consultation%3F" target="_blank" rel="noopener noreferrer" class="bg-green-500 hover:bg-green-600 text-white p-3 rounded-full shadow-lg transition-colors flex items-center justify-center">
            <img src="https://kendyenterprises.in/image/whatsapp-image.png" alt="WhatsApp" class="w-6 h-6">
        </a>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuTrigger = document.getElementById('menuTrigger');
        const closeSidebar = document.getElementById('closeSidebar');

        function toggleSidebar(state) {
            if(state) {
                sidebar.classList.add('active');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            } else {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        menuTrigger.addEventListener('click', () => toggleSidebar(true));
        closeSidebar.addEventListener('click', () => toggleSidebar(false));
        overlay.addEventListener('click', () => toggleSidebar(false));

        // Smoothly fetch and display balance with animation
        async function fetchBalance() {
            try {
                const resp = await fetch('/api/balance');
                const data = await resp.json();
                const el = document.getElementById('balanceText');
                const currencySymbol = document.getElementById('currencySymbol');
                
                // Determine currency symbol based on is_reseller
                const symbol = data.is_reseller ? 'BRL' : '₹';
                currencySymbol.textContent = symbol;
                
                // Animate balance update
                let current = 0;
                const target = data.balance || 0;
                const step = target / 20;
                
                const timer = setInterval(() => {
                    current += step;
                    if(current >= target) {
                        el.innerHTML = '<i class="fas fa-wallet text-cyan-400 mr-1"></i><span id="currencySymbol">' + symbol + '</span>' + target.toFixed(2);
                        clearInterval(timer);
                    } else {
                        el.innerHTML = '<i class="fas fa-wallet text-cyan-400 mr-1"></i><span id="currencySymbol">' + symbol + '</span>' + current.toFixed(2);
                    }
                }, 30);
                
            } catch (err) {
                document.getElementById('balanceText').innerHTML = '<i class="fas fa-wallet text-cyan-400 mr-1"></i>Error';
            }
        }

        // Run on load
        fetchBalance();

        // Prevent zoom and pinch
        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('touchmove', function(e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
