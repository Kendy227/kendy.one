{% extends "admin/layout.html" %}

{% block title %}Error{% endblock %}

{% block page_title %}Error{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card border-danger">
        <div class="card-body text-center py-5">
            <i class="fas fa-exclamation-circle" style="font-size: 3em; color: var(--danger-color); display: block; margin-bottom: 20px;"></i>
            <h3 class="card-title">Oops! An Error Occurred</h3>
            <p class="card-text text-muted">{{ error or 'An unexpected error occurred while processing your request.' }}</p>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-primary mt-3">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
